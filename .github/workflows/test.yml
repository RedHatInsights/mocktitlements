---
name: Tests

on:
  pull_request:
    branches:
    - master
  push:
    branches:
    - master

permissions: {}

jobs:
  testing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Check out source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        show-progress: false
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Run Tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
    - name: Install Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: test/package-lock.json
    - name: Install test environment
      run: npm --prefix test ci
    - name: Setup E2E testing environment
      run: docker compose -f deployments/compose.yaml up -d --build
    - name: Wait for Keycloak import to complete
      run: deployments/wait_for_keycloak_import.sh deployments/compose.yaml
    - name: E2E tests
      run: npm --prefix test test
